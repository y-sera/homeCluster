---
apiVersion: cilium.io/v2alpha1
kind: CiliumBGPClusterConfig
metadata:
  name: cilium-bgp
spec:
  nodeSelector:
   matchExpressions:
     - {key: "kubernetes.io/hostname", operator: Exists} 
  bgpInstances:
  - name: "bgp-nodes"
    localASN: 64513
    peers:
    - name: "peer-to-router"
      peerASN: 64512
      peerAddress: '192.168.1.1'
      peerConfigRef:
        name: "cilium-peer"
