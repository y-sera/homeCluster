apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-dns-etcd
  namespace: argocd
spec:
  project: default
  sources:
  - repoURL: https://gitlab.cluster.orenet.net/y-sera/homecluster.git
    ref: configs
    targetRevision: HEAD
  - repoURL: https://charts.bitnami.com/bitnami
    path: chart
    helm:
      valueFiles:
      - $configs/helm/external-dns-etcd/values.yaml
      releaseName: etcd
    chart: etcd
    targetRevision: 12.0.18
  destination:
    server: "https://kubernetes.default.svc"
    namespace: external-dns
