apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: metrics-server
  namespace: argocd
spec:
  project: default
  sources:
  - repoURL: https://gitlab.cluster.orenet.net/y-sera/homecluster.git
    ref: configs
    targetRevision: HEAD
  - repoURL: https://kubernetes-sigs.github.io/metrics-server/
    path: chart
    helm:
      valueFiles:
      - $configs/helm/metrics-server/values.yaml
      releaseName: metrics-server
    chart: metrics-server
    targetRevision: 3.12.2
  destination:
    server: "https://kubernetes.default.svc"
    namespace: kube-system
