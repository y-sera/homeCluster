apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: argocd-appset-controller
  namespace: argocd
spec:
  commonName: cluster.orenet.net
  dnsNames:
  - argocd-appset-controller.cluster.orenet.net
  - cluster.orenet.net
  duration: 2160h0m0s
  issuerRef:
    group: cert-manager.io
    kind: ClusterIssuer
    name: letsencrypt
  privateKey:
    rotationPolicy: Always
    algorithm: RSA
    encoding: PKCS1
    size: 2048
  renewBefore: 360h0m0s
  secretName: argocd-applicationset-controller-tls
  subject:
    organizations:
    - orenet
  usages:
  - digital signature
